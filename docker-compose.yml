services:
  postgres:
    image: postgres:16
    container_name: dnd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: magic_user
      POSTGRES_PASSWORD: dnd_magic_items
      POSTGRES_DB: mage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magic_user -d mage"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: